<div class="container mt-4">

  <div class="card">

    <img [src]="profile?.image" class="card-img-top">

    <div class="card-body">

      <h3>{{profile?.name}}</h3>

      <p>Age : {{profile?.age}}</p>
      <p>Height : {{profile?.height}}</p>
      <p>Profession : {{profile?.profession}}</p>
      <p>City : {{profile?.city}}</p>

    </div>

  </div>

</div>
